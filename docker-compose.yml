# =====================================================================
# Stack completo para demo: Postgres + Backend + Adminer
# Arrancar todo con: docker compose up --build
# =====================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: admosa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admosa
      POSTGRES_PASSWORD: admosa
      POSTGRES_DB: admosa_test
    ports:
      - "5432:5432"
    volumes:
      - admosa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admosa -d admosa_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Job que corre una sola vez al arrancar: migra schema + carga seeds.
  # Sale (exit 0) cuando termina; el backend espera a que complete.
  db-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: admosa_db_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://admosa:admosa@postgres:5432/admosa_test
      SESSION_SECRET: demo-secret-cambiar-en-produccion-este-string-tiene-mas-de-32-chars
      FRONTEND_URL: http://localhost:4200
    command: sh -c "node dist/db/migrate.js && node dist/db/seed.js"
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: admosa_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://admosa:admosa@postgres:5432/admosa_test
      SESSION_SECRET: demo-secret-cambiar-en-produccion-este-string-tiene-mas-de-32-chars
      SESSION_MAX_AGE_MS: 14400000
      FRONTEND_URL: http://localhost:4200
      STORAGE_PATH: /app/storage
      MAX_FILE_SIZE_BYTES: 52428800
      LOGIN_RATE_LIMIT_MAX: 500
    ports:
      - "4000:4000"
    volumes:
      # Persistir archivos fuera del contenedor (sobreviven a rebuilds)
      - admosa_storage:/app/storage

  adminer:
    image: adminer:latest
    container_name: admosa_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  admosa_pgdata:
  admosa_storage:

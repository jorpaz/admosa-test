<section class="login-page">
  <div class="login-backdrop"></div>

  <mat-card class="login-card">
    <div class="brand">
      <div class="brand-icon">
        <mat-icon>shield_lock</mat-icon>
      </div>
      <div>
        <h1>ADMOSA</h1>
        <p>Gestión segura de archivos por rol y área</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Correo electrónico</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="username" />
        <mat-icon matPrefix>mail</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Contraseña</mat-label>
        <input
          matInput
          [type]="hidePassword() ? 'password' : 'text'"
          formControlName="password"
          autocomplete="current-password"
        />
        <mat-icon matPrefix>lock</mat-icon>
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hidePassword.set(!hidePassword())"
          [attr.aria-label]="'Mostrar contraseña'"
        >
          <mat-icon>{{ hidePassword() ? 'visibility' : 'visibility_off' }}</mat-icon>
        </button>
      </mat-form-field>

      @if (error()) {
        <div class="error-banner">
          <mat-icon>error_outline</mat-icon>
          <span>{{ error() }}</span>
        </div>
      }

      <button mat-flat-button color="primary" class="submit-btn" [disabled]="auth.loading()">
        @if (auth.loading()) {
          <mat-spinner diameter="20"></mat-spinner>
        } @else {
          Ingresar
        }
      </button>
    </form>

    <div class="demo-hint">
      <mat-icon>info</mat-icon>
      <span>Demo: <strong>user@admosa.test</strong> / <strong>Admosa2025!</strong></span>
    </div>
  </mat-card>
</section>
